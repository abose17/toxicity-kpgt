# Conda environment for KPGT fine-tuning on Azure ML.
#
# AML builds a Docker image from this spec layered on top of the base image
# referenced in submit_job.py (`mcr.microsoft.com/.../cuda11.8-...`).
# First build takes ~10 min; subsequent jobs reuse the cached image.
#
# Pinning notes — these versions are known to interoperate:
#   - torch 2.1.x targets CUDA 11.8 wheels (matches the base image)
#   - dgl 1.1.3 ships cu118 wheels at data.dgl.ai/wheels/cu118
#   - KPGT's scripts/finetune.py imports `transformers` (AdamW + polynomial scheduler)
#
# If you bump CUDA, change ALL three: base image, torch wheel index, and DGL wheel index.

name: kpgt-toxric
channels:
  - conda-forge
dependencies:
  - python=3.10
  - pip>=23.0
  - pip:
      # --- Data / scientific (must come before torch so numpy C ext is available) ---
      - numpy>=1.24,<2.0
      - scipy>=1.10
      - pandas>=2.0
      - scikit-learn>=1.3

      # --- ML stack (install order matters: torch before dgl) ---
      - --extra-index-url https://download.pytorch.org/whl/cu118
      - torch==2.1.2
      - --find-links https://data.dgl.ai/wheels/cu118/repo.html
      - dgl==1.1.3
      - dgllife>=0.3.2

      # --- Chemistry ---
      - rdkit>=2023.9.5

      # --- KPGT finetune.py needs these ---
      - transformers>=4.30.0

      # --- Misc ---
      - tqdm>=4.65
      - python-dotenv>=1.0
      - requests>=2.31
